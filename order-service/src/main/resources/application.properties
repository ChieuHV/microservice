spring.application.name=order-service
server.port=8082
eureka.client.service-url.defaultZone = http://localhost:8761/eureka
spring.datasource.url=jdbc:postgresql://localhost:5432/orderservicedb
spring.datasource.username=postgres
spring.datasource.password=12345678
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

eureka.instance.prefer-ip-address=true

# Kafka broker (Docker)
spring.kafka.bootstrap-servers=localhost:9092

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Consumer
spring.kafka.consumer.group-id=order-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/my-realm

management.endpoints.web.exposure.include=health,info,prometheus
management.prometheus.metrics.export.enabled=true

grpc.client.user-service.address=static://localhost:9091
grpc.client.user-service.negotiationType=plaintext
